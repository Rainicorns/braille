<!DOCTYPE html>
<html>
<head><title>React SPA</title></head>
<body>
<div id="root"></div>
<script>
// ============================================================================
// React-like framework (same mini-React as other tests)
// ============================================================================
var React = (function() {
  var hooks = [];
  var hookIndex = 0;
  var rootContainer = null;
  var rootComponentFn = null;

  function createElement(type, props) {
    var children = [];
    for (var i = 2; i < arguments.length; i++) {
      if (Array.isArray(arguments[i])) {
        for (var j = 0; j < arguments[i].length; j++) children.push(arguments[i][j]);
      } else {
        children.push(arguments[i]);
      }
    }
    return { type: type, props: props || {}, children: children };
  }

  function useState(initial) {
    var idx = hookIndex++;
    if (hooks[idx] === undefined) hooks[idx] = initial;
    var si = idx;
    var setter = function(val) {
      hooks[si] = typeof val === "function" ? val(hooks[si]) : val;
      rerender();
    };
    return [hooks[idx], setter];
  }

  function useRef(initial) {
    var idx = hookIndex++;
    if (hooks[idx] === undefined) hooks[idx] = { current: initial };
    return hooks[idx];
  }

  function renderElement(vnode) {
    if (vnode == null || typeof vnode === "boolean") return null;
    if (typeof vnode === "string" || typeof vnode === "number") {
      return document.createTextNode(String(vnode));
    }
    if (Array.isArray(vnode)) {
      var frag = document.createDocumentFragment();
      for (var i = 0; i < vnode.length; i++) {
        var c = renderElement(vnode[i]);
        if (c) frag.appendChild(c);
      }
      return frag;
    }
    if (typeof vnode.type === "function") {
      var result = vnode.type(Object.assign({}, vnode.props, { children: vnode.children }));
      return renderElement(result);
    }
    var el = document.createElement(vnode.type);
    for (var key in vnode.props) {
      if (key === "className") {
        el.setAttribute("class", vnode.props[key]);
      } else if (key === "style" && typeof vnode.props[key] === "object") {
        for (var s in vnode.props[key]) el.style[s] = vnode.props[key][s];
      } else if (key.indexOf("on") === 0) {
        el.addEventListener(key.substring(2).toLowerCase(), vnode.props[key]);
      } else if (key !== "children" && key !== "key" && key !== "ref") {
        el.setAttribute(key, String(vnode.props[key]));
      }
    }
    for (var i = 0; i < vnode.children.length; i++) {
      var c = renderElement(vnode.children[i]);
      if (c) el.appendChild(c);
    }
    return el;
  }

  function render(fn, container) {
    rootContainer = container;
    rootComponentFn = fn;
    rerender();
  }

  function rerender() {
    hookIndex = 0;
    var vdom = rootComponentFn();
    rootContainer.innerHTML = "";
    var dom = renderElement(vdom);
    if (dom) rootContainer.appendChild(dom);
  }

  return { createElement: createElement, useState: useState, useRef: useRef, render: render };
})();

var h = React.createElement;

// ============================================================================
// Client-side router using History API
// ============================================================================
var Router = (function() {
  var listeners = [];

  function navigate(path, state) {
    window.history.pushState(state || null, "", path);
    notifyListeners();
  }

  function notifyListeners() {
    for (var i = 0; i < listeners.length; i++) listeners[i]();
  }

  window.onpopstate = function() { notifyListeners(); };

  function subscribe(fn) {
    listeners.push(fn);
    return function() {
      listeners = listeners.filter(function(l) { return l !== fn; });
    };
  }

  function getPath() {
    return window.location.pathname;
  }

  return { navigate: navigate, subscribe: subscribe, getPath: getPath };
})();

// ============================================================================
// Fake fetch data store (simulates server responses for testing)
// We intercept fetch and return mock data so tests don't need a real server.
// ============================================================================
var mockData = {
  "/api/users": JSON.stringify([
    { id: 1, name: "Alice", email: "alice@example.com" },
    { id: 2, name: "Bob", email: "bob@example.com" },
    { id: 3, name: "Charlie", email: "charlie@test.com" }
  ]),
  "/api/users/1": JSON.stringify({ id: 1, name: "Alice", email: "alice@example.com", bio: "Software engineer" }),
  "/api/search": JSON.stringify([]),
  "/api/contact": JSON.stringify({ success: true, message: "Message sent!" })
};

// Wrap native fetch to intercept and return mock data synchronously via resolved promises
var _realFetch = fetch;
var mockFetch = function(url, opts) {
  opts = opts || {};
  var method = (opts.method || "GET").toUpperCase();
  var key = url;

  // For POST, record the request body for later inspection
  if (method === "POST" && opts.body) {
    window.__lastPostBody = opts.body;
    window.__lastPostUrl = url;
  }

  // For search queries, generate dynamic results
  if (url.indexOf("/api/search") === 0) {
    var qIdx = url.indexOf("?q=");
    var query = qIdx >= 0 ? decodeURIComponent(url.substring(qIdx + 3)) : "";
    var allUsers = JSON.parse(mockData["/api/users"]);
    var results = query ? allUsers.filter(function(u) {
      return u.name.toLowerCase().indexOf(query.toLowerCase()) >= 0;
    }) : [];
    // Return a resolved promise wrapping a mock Response
    return Promise.resolve({
      ok: true,
      status: 200,
      json: function() { return Promise.resolve(results); },
      text: function() { return Promise.resolve(JSON.stringify(results)); },
      headers: { get: function() { return "application/json"; } }
    });
  }

  // Resolve with mock data if available
  if (mockData[key]) {
    return Promise.resolve({
      ok: true,
      status: 200,
      json: function() { return Promise.resolve(JSON.parse(mockData[key])); },
      text: function() { return Promise.resolve(mockData[key]); },
      headers: { get: function() { return "application/json"; } }
    });
  }

  // 404 for unknown endpoints
  return Promise.resolve({
    ok: false,
    status: 404,
    json: function() { return Promise.resolve({ error: "Not found" }); },
    text: function() { return Promise.resolve('{"error":"Not found"}'); },
    headers: { get: function() { return "application/json"; } }
  });
};
// Override both the global `fetch` and `window.fetch` so all call sites use the mock
fetch = mockFetch;
window.fetch = mockFetch;

// ============================================================================
// Shared state store (simulates React context / global state)
// ============================================================================
var Store = (function() {
  var state = {
    users: [],
    selectedUser: null,
    searchResults: [],
    loading: false,
    error: null,
    contactSent: false,
    currentPath: "/"
  };

  var subscribers = [];

  function getState() { return state; }

  function setState(partial) {
    for (var k in partial) state[k] = partial[k];
    for (var i = 0; i < subscribers.length; i++) subscribers[i](state);
  }

  function subscribe(fn) { subscribers.push(fn); }

  return { getState: getState, setState: setState, subscribe: subscribe };
})();

// ============================================================================
// Data fetching actions (uses fetch API + FormData)
// ============================================================================
function loadUsers() {
  Store.setState({ loading: true, error: null });
  fetch("/api/users")
    .then(function(r) { return r.json(); })
    .then(function(users) {
      Store.setState({ users: users, loading: false });
    });
}

function loadUserDetail(id) {
  Store.setState({ loading: true, error: null });
  fetch("/api/users/" + id)
    .then(function(r) { return r.json(); })
    .then(function(user) {
      Store.setState({ selectedUser: user, loading: false });
    });
}

function searchUsers(query) {
  Store.setState({ loading: true });
  fetch("/api/search?q=" + encodeURIComponent(query))
    .then(function(r) { return r.json(); })
    .then(function(results) {
      Store.setState({ searchResults: results, loading: false });
    });
}

function submitContact(formEl) {
  var fd = new FormData(formEl);
  var data = {};
  fd.forEach(function(value, key) { data[key] = value; });

  // Also test FormData methods directly
  var hasName = fd.has("name");
  var nameVal = fd.get("name");
  var allValues = fd.getAll("name");

  fetch("/api/contact", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  })
    .then(function(r) { return r.json(); })
    .then(function(result) {
      Store.setState({
        contactSent: true,
        contactMessage: result.message,
        contactFormData: {
          hasName: hasName,
          nameVal: nameVal,
          allValuesCount: allValues.length
        }
      });
    });
}

// ============================================================================
// Page Components
// ============================================================================
function NavBar() {
  var path = Store.getState().currentPath;
  function link(text, href) {
    return h("a", {
      href: href,
      id: "nav-" + href.replace(/\//g, "").replace(/\s/g, "") || "home",
      className: path === href ? "active" : "",
      onclick: function(e) {
        e.preventDefault();
        Router.navigate(href);
      }
    }, text);
  }
  return h("nav", { id: "navbar" },
    link("Home", "/"),
    " | ",
    link("Users", "/users"),
    " | ",
    link("Search", "/search"),
    " | ",
    link("Contact", "/contact")
  );
}

function HomePage() {
  return h("div", { id: "home-page" },
    h("h1", null, "React SPA"),
    h("p", null, "Welcome to the single-page application demo."),
    h("p", { id: "route-info" }, "Current route: " + Store.getState().currentPath)
  );
}

function UsersPage() {
  var state = Store.getState();
  var content;
  if (state.loading) {
    content = h("p", { id: "loading" }, "Loading users...");
  } else if (state.users.length === 0) {
    content = h("div", null,
      h("p", null, "No users loaded."),
      h("button", { id: "load-users", onclick: loadUsers }, "Load Users")
    );
  } else {
    content = h("ul", { id: "user-list" },
      state.users.map(function(u) {
        return h("li", { key: u.id },
          h("a", {
            href: "/users/" + u.id,
            id: "user-" + u.id,
            onclick: function(e) {
              e.preventDefault();
              Router.navigate("/users/" + u.id, { userId: u.id });
              loadUserDetail(u.id);
            }
          }, u.name),
          " - " + u.email
        );
      })
    );
  }
  return h("div", { id: "users-page" },
    h("h1", null, "Users"),
    content
  );
}

function UserDetailPage() {
  var state = Store.getState();
  if (state.loading) {
    return h("div", { id: "user-detail" }, h("p", { id: "loading" }, "Loading..."));
  }
  var user = state.selectedUser;
  if (!user) {
    return h("div", { id: "user-detail" }, h("p", null, "No user selected."));
  }
  return h("div", { id: "user-detail" },
    h("h1", null, user.name),
    h("p", null, "Email: " + user.email),
    h("p", { id: "user-bio" }, "Bio: " + (user.bio || "N/A")),
    h("button", {
      id: "back-to-users",
      onclick: function() { Router.navigate("/users"); }
    }, "Back to Users")
  );
}

function SearchPage() {
  var state = Store.getState();
  return h("div", { id: "search-page" },
    h("h1", null, "Search Users"),
    h("form", {
      id: "search-form",
      onsubmit: function(e) {
        e.preventDefault();
        var input = document.getElementById("search-input");
        if (input && input.value.trim()) {
          searchUsers(input.value.trim());
          // Update URL with search query
          Router.navigate("/search?q=" + encodeURIComponent(input.value.trim()));
        }
      }
    },
      h("input", { type: "text", id: "search-input", name: "q", placeholder: "Search by name..." }),
      h("button", { type: "submit", id: "search-btn" }, "Search")
    ),
    state.loading ? h("p", null, "Searching...") : null,
    state.searchResults.length > 0 ?
      h("ul", { id: "search-results" },
        state.searchResults.map(function(u) {
          return h("li", { key: u.id, className: "search-result" }, u.name + " (" + u.email + ")");
        })
      ) :
      (state.searchResults.length === 0 && !state.loading ? h("p", { id: "no-results" }, "No results.") : null)
  );
}

function ContactPage() {
  var state = Store.getState();

  if (state.contactSent) {
    return h("div", { id: "contact-page" },
      h("h1", null, "Contact"),
      h("p", { id: "success-msg" }, state.contactMessage || "Sent!"),
      h("p", { id: "fd-has-name" }, "FormData.has(name): " + String(state.contactFormData && state.contactFormData.hasName)),
      h("p", { id: "fd-get-name" }, "FormData.get(name): " + String(state.contactFormData && state.contactFormData.nameVal)),
      h("p", { id: "fd-getall-count" }, "FormData.getAll(name).length: " + String(state.contactFormData && state.contactFormData.allValuesCount)),
      h("button", {
        id: "reset-contact",
        onclick: function() { Store.setState({ contactSent: false, contactMessage: null, contactFormData: null }); }
      }, "Send Another")
    );
  }

  return h("div", { id: "contact-page" },
    h("h1", null, "Contact Us"),
    h("form", {
      id: "contact-form",
      onsubmit: function(e) {
        e.preventDefault();
        submitContact(e.target);
      }
    },
      h("div", null,
        h("label", { htmlFor: "contact-name" }, "Name: "),
        h("input", { type: "text", id: "contact-name", name: "name", value: "" })
      ),
      h("div", null,
        h("label", { htmlFor: "contact-email" }, "Email: "),
        h("input", { type: "email", id: "contact-email", name: "email", value: "" })
      ),
      h("div", null,
        h("label", { htmlFor: "contact-message" }, "Message: "),
        h("textarea", { id: "contact-message", name: "message" })
      ),
      h("div", null,
        h("input", { type: "checkbox", id: "contact-subscribe", name: "subscribe", value: "yes" }),
        h("label", { htmlFor: "contact-subscribe" }, "Subscribe to newsletter")
      ),
      h("select", { name: "priority", id: "contact-priority" },
        h("option", { value: "low" }, "Low"),
        h("option", { value: "normal", selected: "selected" }, "Normal"),
        h("option", { value: "high" }, "High")
      ),
      h("button", { type: "submit", id: "contact-submit" }, "Send Message")
    )
  );
}

// ============================================================================
// App router — maps paths to components
// ============================================================================
function App() {
  var path = Store.getState().currentPath;

  // Route matching
  if (path === "/") return h("div", null, h(NavBar), h(HomePage));
  if (path === "/users") return h("div", null, h(NavBar), h(UsersPage));
  if (path.indexOf("/users/") === 0) return h("div", null, h(NavBar), h(UserDetailPage));
  if (path.indexOf("/search") === 0) return h("div", null, h(NavBar), h(SearchPage));
  if (path === "/contact") return h("div", null, h(NavBar), h(ContactPage));

  // 404
  return h("div", null,
    h(NavBar),
    h("div", { id: "not-found" },
      h("h1", null, "404"),
      h("p", null, "Page not found: " + path)
    )
  );
}

// ============================================================================
// Wire up router → store → render
// ============================================================================
Router.subscribe(function() {
  Store.setState({ currentPath: Router.getPath() });
});

Store.subscribe(function() {
  React.render(App, document.getElementById("root"));
});

// Set initial URL and render
window.location.href = "https://spa.example.com/";
Store.setState({ currentPath: "/" });

// ============================================================================
// Test helper: expose globals for direct manipulation from Rust tests
// ============================================================================
window.__test = {
  getStore: function() { return Store.getState(); },
  navigate: function(path) { Router.navigate(path); },
  getHistoryLength: function() { return window.history.length; },
  getHistoryState: function() { return window.history.state; }
};
</script>
</body>
</html>
